<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyles.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
    </div>

    <div class="container">
        <h2>Reset Password</h2>
        <form id="reset-password-form">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required placeholder="New password" />

            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required
                placeholder="Confirm password" />

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
    <script>


        // Handle the form submission using AJAX
        document.getElementById("reset-password-form").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent the form from submitting the normal way

            const formData = new FormData(this);



            // Send AJAX request to the backend

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');  // Get token from the URL query string

            fetch(`/reset-password?token=${token}`, {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    // Hide loading spinner
                    hideLoading();

                    // Show notification based on the response
                    showNotification(data.message, data.status);

                    // If successful, redirect to the login page after 3 seconds
                    if (data.status === 'success') {
                        setTimeout(() => {
                            // Clear form fields immediately after reset
                            document.getElementById("reset-password-form").reset();
                            window.location.href = "/";  // Redirect to login page
                        }, 3000);  // Redirect after 3 seconds
                    }
                })
                .catch(error => {
                    // Hide loading spinner


                    showNotification("An error occurred. Please try again.", "danger");
                });
        });
    </script>
</body>

</html>
