
{% extends "payrollbase.html" %}
{% block content %}
                    <h2>Add New Employee</h2>
                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}
                    <form action="/add_employee" id="employee_form" method="POST">
                        <div>
                            <label>Employee Name <span style="color: red;">*</span></label>
                            <div class="form-group row">

                                <div class="col-md-6">
                                    <input type="text" class="form-control form-control-sm" id="employee_fname"
                                           name="employee_fname"
                                           placeholder="First name" required>
                                </div>
                                <div class="col-md-6">
                                    <input type="text" class="form-control form-control-sm" id="employee_lname"
                                           name="employee_lname"
                                           placeholder="Last name" required>
                                </div>
                            </div>
                        </div>


                        <div class="form-group">
                            <label for="nssf_num">NSSF Number <span style="color: red;">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="nssf_num" name="nssf_num"
                                   placeholder="Enter 13 Digit number" minlength="13" maxlength="13">
                        </div>
                        <div class="form-group">
                            <label for="tin_num">TIN Number <span style="color: red;">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="tin_num" name="tin_num"
                                   placeholder="Enter 10 Digit number" minlength="10" maxlength="10">
                        </div>
                        <div class="form-group">
                            <label for="basic_salary">Basic Salary <span style="color: red;">*</span></label>
                            <input type="text" placeholder="Enter Gross Salary e.g 100000"
                                   class="form-control form-control-sm"
                                   id="basic_salary" name="basic_salary">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender <span style="color: red;">*</span></label>
                            <select class="form-control form-control-sm" id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="row">


                            <div class="form-group col-md-6">
                                <label for="tel">Phone<span style="color: red;">*</span></label>
                                <input type="text" class="form-control form-control-sm" id="tel" name="tel"
                                       placeholder="+256772123456"
                                       required>
                            </div>


                            <div class="form-group col-md-6">
                                <label for="email">Email</label>

                                <input type="email" class="form-control form-control-sm" id="email" name="email"
                                       placeholder="john@example.com"
                                >

                            </div>
                        </div>
                        <div class="form-group">
                            <label for="date_of_birth">Date of Birth</label>
                            <input type="date" class="form-control form-control-sm" id="date_of_birth"
                                   name="date_of_birth"
                                   placeholder="optional">
                        </div>

                        <div class="form-group">
                            <label for="position">Position <span style="color: red;">*</span></label>
                            <input type="text" list="positions" placeholder="Finance & Administration"
                                   class="form-control form-control-sm"
                                   id="position" name="position" required>
                            <datalist id="positions">
                                {% for position in positions %}
                                <option value="{{ position }}">
                                    {% endfor %}
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label for="employee_id">Employee ID <span style="color: red;">*</span></label>
                            <input type="number" placeholder="001" class="form-control form-control-sm" id="employee_id"
                                   name="employee_id"
                                   required>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Employee</button>
                    </form>

{% endblock %}
