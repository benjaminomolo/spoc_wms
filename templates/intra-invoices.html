<script>
    // Wait for the document to be ready
    document.addEventListener('DOMContentLoaded', function() {
        // Get references to the form, input field, and results container
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const searchResultsContainer = document.getElementById('searchResultsContainer');

        // Function to redirect to invoice page
        function redirectToInvoice(invoiceNumber) {
            window.location.href = `/invoice/${invoiceNumber}`;
        }

        // Function to perform search
        function performSearch(query) {
            // Make an AJAX request to the server to search for the query
            fetch(`/search?keyword=${query}`)
                .then(response => response.json())
                .then(data => {
                    // Clear previous search results
                    searchResultsContainer.innerHTML = '';

                    // Iterate over search results and create HTML elements to display them
                    data.forEach(result => {
                        const resultItem = document.createElement('div');
                        resultItem.textContent = result.client + ' - ' + result.invoice_number;
                        resultItem.classList.add('searchResultItem');

                        // Add event listeners for hover effect
                        resultItem.addEventListener('mouseenter', function() {
                            resultItem.classList.add('hovered');
                        });

                        resultItem.addEventListener('mouseleave', function() {
                            resultItem.classList.remove('hovered');
                        });

                        // Add event listener for click to redirect
                        resultItem.addEventListener('click', function() {
                            redirectToInvoice(result.invoice_number);
                        });

                        searchResultsContainer.appendChild(resultItem);
                    });
                })
                .catch(error => console.error('Error fetching search results:', error));
        }

        // Attach event listener to the input field for input event
        searchInput.addEventListener('input', function(event) {
            // Get the search query from the input field
            const query = event.target.value.trim();

            // Perform search only if the query is not empty
            if (query !== '') {
                performSearch(query);
            } else {
                // Clear search results if the query is empty
                searchResultsContainer.innerHTML = '';
            }
        });
    });
</script>

<style>
    .searchResultItem {
        padding: 5px;
        border-bottom: 1px solid #ccc;
        cursor: pointer;
    }

    .searchResultItem.hovered {
        background-color: #f0f0f0;
    }
</style>
